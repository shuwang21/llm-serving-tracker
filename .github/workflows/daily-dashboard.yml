name: Daily dashboard

on:
  schedule:
    # 15:00 UTC ≈ 07:00/08:00 America/Los_Angeles (covers PDT/PST), a few hours after midnight PT
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Compute yesterday (America/Los_Angeles)
        id: date
        run: echo "date=$(TZ=America/Los_Angeles date -d yesterday +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch + render
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_daily.py --date ${{ steps.date.outputs.date }}

      - name: Commit generated data + report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public
          git diff --cached --quiet || git commit -m "Daily dashboard: ${{ steps.date.outputs.date }}"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
