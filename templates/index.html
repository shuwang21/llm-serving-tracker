<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Serving Development Tracker</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --panel-2: #f0f2f5;
    --border: #d8dde6;
    --border-soft: #e6e9ef;
    --text: #1c2130;
    --text-dim: #5b6478;
    --text-faint: #8a92a6;
    --link: #0369a1;
    --add: #15803d;
    --del: #dc2626;
    --warn: #b45309;
    --accent-sglang: #22c55e;
    --accent-vllm: #f59e0b;
    --radius: 10px;
    --radius-sm: 7px;
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0c12;
      --panel: #12151f;
      --panel-2: #191d29;
      --border: #242938;
      --border-soft: #1c202c;
      --text: #e8eaf0;
      --text-dim: #8b93a7;
      --text-faint: #5c6478;
      --link: #7dd3fc;
      --add: #4ade80;
      --del: #f87171;
      --warn: #fbbf24;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 28px 20px 64px; }

  header.page-header {
    text-align: center; padding: 28px 0 20px;
    border-bottom: 1px solid var(--border-soft);
  }
  header.page-header h1 {
    margin: 0; font-size: 21px; font-weight: 650; letter-spacing: -0.01em;
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px;
  }
  header.page-header .date-badge {
    display: inline-block; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 12px; font-size: 12.5px; color: var(--text-dim);
    font-family: var(--mono); font-weight: 400;
  }

  .range-bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
    margin: 16px 0 0;
  }
  .range-bar button {
    background: var(--panel); color: var(--text-dim); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
  }
  .range-bar button:hover { color: var(--text); border-color: var(--text-faint); }
  .range-bar button.active { background: var(--panel-2); color: var(--text); border-color: var(--text-faint); font-weight: 600; }
  .range-custom { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--text-dim); }
  .range-custom input[type="date"] {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 4px 8px; font-size: 12.5px; font-family: var(--mono);
  }
  #status { text-align: center; color: var(--text-faint); font-size: 13px; min-height: 20px; margin-top: 10px; }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0 28px; }
  @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }

  .repo-column {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; border-top: 3px solid var(--repo-color, var(--border));
  }
  .repo-column h2 {
    margin: 0 0 5px; font-size: 18px; font-weight: 650;
    display: flex; align-items: center; gap: 8px;
  }
  .repo-column h2::before {
    content: ""; display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--repo-color, var(--text-dim));
  }
  .repo-column .repo-total { color: var(--text-dim); font-size: 12.5px; margin-bottom: 18px; }
  .repo-column .repo-total a { color: var(--text-faint); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat {
    background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
    padding: 11px 13px;
  }
  .stat .value { font-size: 19px; font-weight: 650; font-family: var(--mono); letter-spacing: -0.02em; }
  .stat .label { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }

  .high-impact-list {
    margin-bottom: 18px; font-size: 13px; color: var(--text-dim);
    background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .high-impact-scroll { height: 110px; overflow-y: auto; }
  .high-impact-scroll .empty-note { margin: 0; color: var(--text-faint); }
  .high-impact-title {
    font-weight: 650; color: var(--text); margin-bottom: 6px; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px;
  }
  .high-impact-title::before { content: "⚠"; color: var(--warn); font-size: 12px; }
  .high-impact-list ul { margin: 0; padding-left: 0; list-style: none; }
  .high-impact-list li { padding: 4px 0; border-top: 1px dashed var(--border-soft); }
  .high-impact-list li:first-child { border-top: none; }
  .high-impact-list a { color: var(--link); text-decoration: none; }
  .high-impact-list a:hover { text-decoration: underline; }

  .category-box { height: 230px; overflow-y: auto; margin-bottom: 20px; border: 1px solid var(--border-soft); border-radius: var(--radius-sm); }
  .category-box table.mini-table { margin-bottom: 0; }
  .category-box thead th { position: sticky; top: 0; background: var(--panel); }

  .pr-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .pr-filter label { font-size: 11px; font-weight: 650; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .pr-filter select {
    flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; font-family: inherit;
  }

  table.mini-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
  table.mini-table th, table.mini-table td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border-soft); }
  table.mini-table th { color: var(--text-faint); font-weight: 650; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  table.mini-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  table.mini-table tbody tr:last-child td { border-bottom: none; }
  table.mini-table tbody tr:hover td { background: var(--panel-2); }

  .pr-list {
    max-height: 480px; overflow-y: auto; border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
    padding: 10px; background: var(--bg);
  }
  .pr-list::-webkit-scrollbar { width: 8px; }
  .pr-list::-webkit-scrollbar-track { background: transparent; }
  .pr-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .pr-card {
    background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
    padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s ease;
  }
  .pr-card:hover { border-color: var(--border); }
  .pr-card:last-child { margin-bottom: 0; }
  .pr-card .pr-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
  .pr-card .pr-title a { color: var(--text); text-decoration: none; }
  .pr-card .pr-title a:hover { color: var(--link); }
  .pr-card .pr-meta {
    color: var(--text-dim); font-size: 12px; margin-top: 7px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .pr-card .pr-stats {
    color: var(--text-faint); font-size: 11.5px; margin-top: 7px;
    font-variant-numeric: tabular-nums; font-family: var(--mono);
  }
  .pr-card .pr-stats .add { color: var(--add); }
  .pr-card .pr-stats .del { color: var(--del); }
  .pr-card .high-impact-flag { color: var(--warn); font-weight: 600; }
  .pr-list .truncate-note { text-align: center; color: var(--text-faint); font-size: 12px; padding: 8px 0 2px; }

  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 5px; font-size: 10.5px;
    font-weight: 650; color: #0b0e14; letter-spacing: 0.01em;
  }

  footer.page-footer {
    margin-top: 44px; padding-top: 20px; border-top: 1px solid var(--border-soft);
    color: var(--text-faint); font-size: 12px; text-align: center;
  }
  footer.page-footer p { margin: 4px 0; max-width: 640px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>
<div class="container">

  <header class="page-header">
    <h1>
      LLM Serving Development Tracker
      <span class="date-badge" id="range-badge">loading…</span>
    </h1>
    <div class="range-bar">
      <button data-preset="1d">1D</button>
      <button data-preset="7d">7D</button>
      <button data-preset="30d">30D</button>
      <button data-preset="1y">1Y</button>
      <button data-preset="all">All</button>
      <span class="range-custom">
        <input type="date" id="from-date"> &ndash; <input type="date" id="to-date">
        <button id="apply-custom">Apply</button>
      </span>
    </div>
    <div id="status"></div>
  </header>

  <div class="columns" id="columns"></div>

  <footer class="page-footer">
    <p>Tracking where SGLang and vLLM are currently focused, based on merged PRs from public GitHub repositories &mdash; meant as a reference for following along and learning from active development, not a mirror of GitHub content.</p>
    <p id="footer-updated"></p>
  </footer>

</div>
<script>
const REPOS = {
  sglang: { label: "SGLang", color: "#22c55e", url: "https://github.com/sgl-project/sglang" },
  vllm: { label: "vLLM", color: "#f59e0b", url: "https://github.com/vllm-project/vllm" },
};
const CATEGORY_COLORS = {
  "AMD / ROCm": "#e0663f",
  "NVIDIA / CUDA": "#76b900",
  "Speculative Decoding": "#8b5cf6",
  "MoE / Expert Parallel": "#ec4899",
  "Scheduler / Runtime": "#0ea5e9",
  "KV Cache / Memory": "#f59e0b",
  "Distributed / PD Disaggregation": "#14b8a6",
  "Model Support": "#6366f1",
  "Frontend / API / Tool Calling": "#22c55e",
  "Docs / Cookbook": "#94a3b8",
  "CI / Tests": "#64748b",
  "Cleanup / Refactor": "#a8a29e",
  "Other": "#9ca3af",
};
const MAX_CARDS = 400;
const SUMMARY_MODE_DAYS = 62;

let manifestDates = [];
let manifestMonths = [];
const dayCache = {};
const monthCache = {};

const $ = (sel) => document.querySelector(sel);

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function shiftDate(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}

function datesInRange(from, to) {
  return manifestDates.filter((d) => d >= from && d <= to);
}

async function fetchDay(date) {
  if (!dayCache[date]) {
    const resp = await fetch(`data/${date}.json`);
    if (!resp.ok) throw new Error(`failed to load ${date}.json`);
    dayCache[date] = await resp.json();
  }
  return dayCache[date];
}

async function fetchMonth(month) {
  if (!monthCache[month]) {
    const resp = await fetch(`data/months/${month}.json`);
    if (!resp.ok) throw new Error(`failed to load months/${month}.json`);
    monthCache[month] = await resp.json();
  }
  return monthCache[month];
}

function monthBounds(month) {
  const [y, m] = month.split("-").map(Number);
  const last = new Date(Date.UTC(y, m, 0)).getUTCDate();
  return [`${month}-01`, `${month}-${String(last).padStart(2, "0")}`];
}

function impactScore(p) {
  return p.changedFiles + p.additions + p.deletions;
}

function aggregate(days, months, summaryMode) {
  const out = {};
  for (const key of Object.keys(REPOS)) {
    const dayPrs = [];
    for (const day of days) dayPrs.push(...(day.repos[key] || []));

    const authors = new Set(dayPrs.map((p) => p.author));
    const catCounts = {};
    let total = dayPrs.length, additions = 0, deletions = 0;
    for (const p of dayPrs) {
      additions += p.additions;
      deletions += p.deletions;
      catCounts[p.category] = (catCounts[p.category] || 0) + 1;
    }
    const highImpact = dayPrs.filter((p) => p.highImpact);

    for (const m of months) {
      const r = m.repos[key];
      if (!r) continue;
      total += r.total;
      additions += r.additions;
      deletions += r.deletions;
      for (const a of Object.keys(r.authors)) authors.add(a);
      for (const [cat, n] of Object.entries(r.categories)) catCounts[cat] = (catCounts[cat] || 0) + n;
      highImpact.push(...r.highImpact);
    }

    const categoryDist = Object.entries(catCounts).sort((a, b) => b[1] - a[1]);
    highImpact.sort((a, b) => impactScore(b) - impactScore(a));

    const prs = summaryMode
      ? highImpact
      : dayPrs.sort((a, b) => (a.mergedAt < b.mergedAt ? 1 : -1));

    out[key] = {
      prs,
      total,
      uniqueAuthors: authors.size,
      additions,
      deletions,
      categoryDist,
      topCategory: categoryDist[0] || null,
      highImpact,
      summaryMode,
    };
  }
  return out;
}

function prCardHtml(pr) {
  const color = CATEGORY_COLORS[pr.category] || "#9ca3af";
  const flag = pr.highImpact ? '<span class="high-impact-flag">⚠ potentially important</span>' : "";
  return `
    <div class="pr-card" data-category="${esc(pr.category)}">
      <div class="pr-title"><a href="${esc(pr.url)}" target="_blank" rel="noopener">#${pr.number} ${esc(pr.title)}</a></div>
      <div class="pr-meta">
        <span class="badge" style="background: ${color}">${esc(pr.category)}</span>
        <span>by ${esc(pr.author)}</span>
        <span>merged ${esc(pr.mergedAt)}</span>
        <span>base: ${esc(pr.baseRefName)}</span>
        ${flag}
      </div>
      <div class="pr-stats">
        ${pr.changedFiles} files &middot;
        <span class="add">+${pr.additions.toLocaleString()}</span> /
        <span class="del">-${pr.deletions.toLocaleString()}</span> &middot;
        ${pr.commits} commits
      </div>
    </div>`;
}

function repoColumnHtml(key, st) {
  const repo = REPOS[key];
  const top = st.topCategory ? `${esc(st.topCategory[0])}` : "—";
  const topCount = st.topCategory ? st.topCategory[1] : 0;

  const hiItems = st.highImpact.length
    ? `<ul>${st.highImpact.map((p) => `<li><a href="${esc(p.url)}" target="_blank" rel="noopener">#${p.number} ${esc(p.title)}</a></li>`).join("")}</ul>`
    : '<p class="empty-note">None matched the high-impact heuristics in this range.</p>';

  const catRows = st.categoryDist
    .map(([cat, n]) => `<tr><td>${esc(cat)}</td><td class="num">${n}</td></tr>`)
    .join("");

  const catOptions = st.categoryDist
    .map(([cat, n]) => `<option value="${esc(cat)}">${esc(cat)} (${n})</option>`)
    .join("");

  const shown = st.prs.slice(0, MAX_CARDS);
  const cards = shown.length
    ? shown.map(prCardHtml).join("")
    : '<p style="color: var(--text-dim); font-size: 13px;">No merged PRs in this range.</p>';
  let truncNote = "";
  if (st.summaryMode) {
    truncNote = `<div class="truncate-note">Long range: showing top ${shown.length.toLocaleString()} high-impact PRs of ${st.total.toLocaleString()} merged — pick a range under ${SUMMARY_MODE_DAYS} days to browse all PRs.</div>`;
  } else if (st.prs.length > MAX_CARDS) {
    truncNote = `<div class="truncate-note">Showing latest ${MAX_CARDS} of ${st.prs.length.toLocaleString()} PRs — narrow the range or filter by category to see the rest.</div>`;
  }

  return `
    <div class="repo-column" style="--repo-color: ${repo.color}">
      <h2>${repo.label}</h2>
      <div class="repo-total">${st.total.toLocaleString()} merged PRs &middot; <a href="${repo.url}" target="_blank" rel="noopener">${repo.url}</a></div>

      <div class="stat-grid">
        <div class="stat"><div class="value">${st.total.toLocaleString()}</div><div class="label">Merged PRs</div></div>
        <div class="stat"><div class="value">${st.uniqueAuthors.toLocaleString()}</div><div class="label">Unique authors</div></div>
        <div class="stat"><div class="value">+${st.additions.toLocaleString()} / -${st.deletions.toLocaleString()}</div><div class="label">Lines changed</div></div>
        <div class="stat"><div class="value">${top}</div><div class="label">Top category (${topCount})</div></div>
      </div>

      <div class="high-impact-list">
        <div class="high-impact-title">Notable potentially high-impact PRs</div>
        <div class="high-impact-scroll">${hiItems}</div>
      </div>

      <div class="category-box">
        <table class="mini-table">
          <thead><tr><th>Category</th><th class="num">PRs</th></tr></thead>
          <tbody>${catRows}</tbody>
        </table>
      </div>

      <div class="pr-filter">
        <label>Category</label>
        <select onchange="filterPRs(this)">
          <option value="all" selected>All</option>
          ${catOptions}
        </select>
      </div>

      <div class="pr-list">${cards}${truncNote}</div>
    </div>`;
}

function filterPRs(sel) {
  const v = sel.value;
  sel.closest(".repo-column").querySelectorAll(".pr-card").forEach((card) => {
    card.style.display = (v === "all" || card.dataset.category === v) ? "" : "none";
  });
}

async function loadRange(from, to) {
  const dates = datesInRange(from, to);
  const badge = $("#range-badge");
  const status = $("#status");

  if (!dates.length) {
    badge.textContent = `${from} – ${to}`;
    status.textContent = "No data available in this range.";
    $("#columns").innerHTML = "";
    return;
  }

  badge.textContent = dates.length === 1
    ? `${dates[0]} report`
    : `${dates[0]} – ${dates[dates.length - 1]} · ${dates.length} days`;

  const summaryMode = dates.length > SUMMARY_MODE_DAYS && manifestMonths.length > 0;
  let fullMonths = [], fetchDates = dates;
  if (summaryMode) {
    fullMonths = manifestMonths.filter((m) => {
      const [mStart, mEnd] = monthBounds(m);
      return mStart >= from && mEnd <= to;
    });
    const monthSet = new Set(fullMonths);
    fetchDates = dates.filter((d) => !monthSet.has(d.slice(0, 7)));
  }
  status.textContent = summaryMode
    ? `Loading ${fullMonths.length} month summaries + ${fetchDates.length} days…`
    : `Loading ${dates.length} day${dates.length > 1 ? "s" : ""}…`;

  try {
    const [days, months] = await Promise.all([
      Promise.all(fetchDates.map(fetchDay)),
      Promise.all(fullMonths.map(fetchMonth)),
    ]);
    const agg = aggregate(days, months, summaryMode);
    $("#columns").innerHTML = Object.keys(REPOS).map((k) => repoColumnHtml(k, agg[k])).join("");
    status.textContent = "";
  } catch (err) {
    status.textContent = `Failed to load data: ${err.message}`;
  }
}

function setActiveButton(btn) {
  document.querySelectorAll(".range-bar button[data-preset]").forEach((b) => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
}

function applyPreset(preset, btn) {
  const latest = manifestDates[manifestDates.length - 1];
  let from;
  if (preset === "1d") from = latest;
  else if (preset === "7d") from = shiftDate(latest, -6);
  else if (preset === "30d") from = shiftDate(latest, -29);
  else if (preset === "1y") from = shiftDate(latest, -364);
  else from = manifestDates[0];
  setActiveButton(btn);
  $("#from-date").value = from < manifestDates[0] ? manifestDates[0] : from;
  $("#to-date").value = latest;
  loadRange(from, latest);
}

async function init() {
  try {
    const resp = await fetch("data/manifest.json");
    const manifest = await resp.json();
    manifestDates = manifest.dates;
    manifestMonths = manifest.months || [];
  } catch (err) {
    $("#status").textContent = "Failed to load data manifest.";
    return;
  }
  if (!manifestDates.length) {
    $("#status").textContent = "No data published yet.";
    return;
  }

  const first = manifestDates[0];
  const latest = manifestDates[manifestDates.length - 1];
  for (const id of ["#from-date", "#to-date"]) {
    $(id).min = first;
    $(id).max = latest;
  }
  $("#footer-updated").textContent = `Latest data: ${latest} (America/Los_Angeles days)`;

  document.querySelectorAll(".range-bar button[data-preset]").forEach((btn) => {
    btn.addEventListener("click", () => applyPreset(btn.dataset.preset, btn));
  });
  $("#apply-custom").addEventListener("click", () => {
    const from = $("#from-date").value, to = $("#to-date").value;
    if (!from || !to || from > to) {
      $("#status").textContent = "Pick a valid from/to range.";
      return;
    }
    setActiveButton(null);
    loadRange(from, to);
  });

  applyPreset("1d", document.querySelector('.range-bar button[data-preset="1d"]'));
}

init();
</script>
</body>
</html>
